name: CI

on:
  push:
    branches:
      - main
      - fluxo-de-conta
      - fluxo-de-autenticacao
      - fluxo-de-trasacoes
      - fluxo-de-seguranca
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Validate Maven wrapper
        run: ./mvnw -v

      - name: Compile
        run: ./mvnw clean compile -DskipTests

      - name: Test
        run: ./mvnw test
